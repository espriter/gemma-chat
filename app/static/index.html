<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADS-B Chat</title>
  <link rel="icon" href="static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1><a href="./" style="color:inherit;text-decoration:none;">ADS-B Chat</a></h1>
        <nav id="tabs">
          <button class="tab active" data-view="chat" type="button">Chat</button>
          <button class="tab" data-view="map" type="button">Map</button>
        </nav>
      </div>
      <span id="status" class="status offline">offline</span>
    </header>

    <div id="messages"></div>

    <div id="map-view" hidden>
      <iframe id="map-frame"
              allow="geolocation; fullscreen"
              title="ADSBexchange Global Map"></iframe>
      <div id="map-mobile-notice" hidden>
        <div class="mobile-notice-inner">
          <div class="mobile-notice-icon">🗺</div>
          <h2>ADSBexchange 글로벌 맵</h2>
          <p>iOS/모바일 브라우저는 보안 정책상 iframe 임베드가 제대로 동작하지 않습니다 (데이터 fetch가 403으로 차단됨).</p>
          <button type="button" id="map-open-new-mobile" class="mobile-notice-btn">새 창에서 열기 ↗</button>
        </div>
      </div>
      <div class="map-attribution">
        <span>Powered by <a href="https://globe.adsbexchange.com/" target="_blank" rel="noopener">ADSBexchange</a></span>
        <button type="button" id="map-open-new" class="map-link-btn">새 창으로 열기 ↗</button>
        <button type="button" id="map-reload" class="map-link-btn">↻ 다시 로드</button>
      </div>
    </div>

    <div id="toolbar">
      <div id="quickstart">
        <button class="qs-btn" data-tool="recent_aircraft" data-args='{"minutes":30,"limit":10}'>
          <span class="qs-icon">✈</span>
          <span class="qs-label">최근 항공기</span>
        </button>
        <button class="qs-btn" data-tool="traffic_summary" data-args='{"days":7}'>
          <span class="qs-icon">📊</span>
          <span class="qs-label">주간 트래픽</span>
        </button>
        <button class="qs-btn" data-tool="farthest_aircraft" data-args='{"hours":24,"limit":10}'>
          <span class="qs-icon">🌐</span>
          <span class="qs-label">가장 먼 항공기</span>
        </button>
        <button class="qs-btn" data-tool="search_aircraft" data-args='{"hex_ident":"","hours":24}'>
          <span class="qs-icon">🔍</span>
          <span class="qs-label">항공기 위치</span>
        </button>
        <button class="qs-btn" data-tool="lookup_aircraft" data-args='{"hex_ident":""}'>
          <span class="qs-icon">ℹ️</span>
          <span class="qs-label">항공기 정보</span>
        </button>
        <button class="qs-btn" data-tool="get_weather" data-args='{"location":"Seongnam"}'>
          <span class="qs-icon">☁️</span>
          <span class="qs-label">성남 날씨</span>
        </button>
      </div>

      <button id="llm-toggle" type="button">
        <span class="llm-icon">💬</span>
        <span class="llm-text">LLM에게 질문하기</span>
      </button>

      <form id="chat-form" onsubmit="return false" hidden>
        <button type="button" id="close-llm" aria-label="닫기">✕</button>
        <textarea id="input" placeholder="AI에게 질문하기..." rows="1"></textarea>
        <button type="submit" id="send-btn">Send</button>
        <button type="button" id="cancel-btn">Stop</button>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="static/app.js"></script>
</body>
</html>
