# Ollama systemd override for MiniPC resource limiting
# Install: sudo mkdir -p /etc/systemd/system/ollama.service.d/
#          sudo cp /srv/gemma-chat/ollama-override.conf /etc/systemd/system/ollama.service.d/override.conf
#          sudo systemctl daemon-reload && sudo systemctl restart ollama

[Service]
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_MAX_LOADED_MODELS=1"
Environment="OLLAMA_KEEP_ALIVE=0"
Environment="OLLAMA_HOST=127.0.0.1:11434"
Environment="OLLAMA_LOAD_TIMEOUT=10m"

# Hard resource limits
MemoryMax=3G
MemoryHigh=2500M
CPUQuota=50%
Nice=15
IOWeight=50
